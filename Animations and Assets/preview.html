<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Monitor - Animation Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    h1 { font-size: 14px; margin-bottom: 10px; opacity: 0.5; font-weight: 400; letter-spacing: 1px; }
    .scene {
      position: relative;
      width: min(90vw, 800px);
      aspect-ratio: 1123 / 842;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .scene > * { position: absolute; }

    /* ---- Background ---- */
    .layer-bg { inset: 0; width: 100%; height: 100%; z-index: 1; }
    .layer-bg svg { width: 100%; height: 100%; display: block; }

    /* ---- Screen / Monitor ---- */
    .layer-screen {
      z-index: 2; width: 27.6%; left: 14.5%; bottom: 19%;
      transform-origin: bottom center;
      animation: screenSway 5s ease-in-out infinite;
    }
    .layer-screen svg { width: 100%; height: auto; display: block; }
    @keyframes screenSway {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(0.4deg); }
    }

    /* ---- ECG line ---- */
    .ecg-line {
      stroke-dasharray: 500;
      animation: ecgDraw 2.5s linear infinite;
    }
    @keyframes ecgDraw {
      0%   { stroke-dasharray: 0 500; stroke-dashoffset: 0; }
      80%  { stroke-dasharray: 500 0; stroke-dashoffset: 0; }
      81%  { stroke-dasharray: 0 500; stroke-dashoffset: 0; }
      100% { stroke-dasharray: 0 500; stroke-dashoffset: 0; }
    }

    /* ---- Monitor glow ---- */
    .monitor-glow {
      z-index: 2; width: 22%; aspect-ratio: 320/172;
      left: 17.2%; bottom: 40.5%;
      background: radial-gradient(ellipse, rgba(179,240,166,0.12) 0%, transparent 70%);
      border-radius: 12px;
      animation: glowPulse 2.5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.3; } 35% { opacity: 1; } 70% { opacity: 0.3; }
    }

    /* ---- Shadow ---- */
    .shadow {
      z-index: 2; width: 25%; height: 3%;
      background: radial-gradient(ellipse, rgba(0,0,0,0.12) 0%, transparent 70%);
      left: 43.5%; bottom: 17.5%; border-radius: 50%;
      animation: shadowAnim 5s ease-in-out infinite;
    }
    @keyframes shadowAnim {
      0%, 100%       { transform: scaleX(1); opacity: 0.8; }
      12%, 24%       { transform: scaleX(0.95); opacity: 0.6; }
      /* laugh bounces */
      44%            { transform: scaleX(1.03); opacity: 0.85; }
      48%            { transform: scaleX(0.92); opacity: 0.55; }
      52%            { transform: scaleX(1.02); opacity: 0.8; }
      56%            { transform: scaleX(0.94); opacity: 0.6; }
      60%            { transform: scaleX(1.01); opacity: 0.75; }
      68%            { transform: scaleX(1); opacity: 0.7; }
    }

    /* ============================================
       HEART CHARACTER - Wave + Laugh
       5-second loop:
         0–2s (0–40%):   Arm waves hello
         2–4s (40–80%):  Laugh (bounce, squint, big smile)
         4–5s (80–100%): Settle, gentle breathe
       ============================================ */

    .layer-heart {
      z-index: 3; width: 47%; left: 33%; bottom: 19%;
      transform-origin: bottom center;
      animation: heartFullBody 5s ease-in-out infinite;
    }
    .layer-heart svg { width: 100%; height: auto; display: block; overflow: visible; }

    @keyframes heartFullBody {
      /* Soft breathe throughout */
      0%   { transform: scale(1) translateY(0); }
      15%  { transform: scale(1.008) translateY(-0.15%); }
      30%  { transform: scale(1) translateY(0); }
      45%  { transform: scale(1.008) translateY(-0.15%); }
      60%  { transform: scale(1) translateY(0); }
      75%  { transform: scale(1.008) translateY(-0.15%); }
      100% { transform: scale(1) translateY(0); }
    }

    /* ---- ARM WAVE ---- */
    .arm-wave {
      transform-origin: 240px 202px;
      animation: armWave 5s ease-in-out infinite;
    }
    @keyframes armWave {
      0%        { transform: rotate(0deg) translateX(0) translateY(0); }
      5%        { transform: rotate(-5deg) translateX(-1px) translateY(-1.5px); }
      10%       { transform: rotate(-7deg) translateX(0px) translateY(-2px); }
      15%       { transform: rotate(-4deg) translateX(1px) translateY(-1px); }
      20%       { transform: rotate(-6deg) translateX(-0.5px) translateY(-2px); }
      25%       { transform: rotate(-3.5deg) translateX(1px) translateY(-1px); }
      30%       { transform: rotate(-5deg) translateX(-0.5px) translateY(-1.5px); }
      35%       { transform: rotate(-2deg) translateX(0.5px) translateY(-0.5px); }
      40%       { transform: rotate(0deg) translateX(0) translateY(0); }
      100%      { transform: rotate(0deg) translateX(0) translateY(0); }
    }

    /* ---- EYE BLINK + LAUGH SQUINT ---- */
    .eye {
      animation: eyeFullAnim 5s ease-in-out infinite;
    }
    .eye-r { animation-delay: 0.04s; }

    @keyframes eyeFullAnim {
      /* Blink during wave */
      0%, 14%, 18%, 100% { transform: scaleY(1); }
      16%                { transform: scaleY(0.1); }

      /* Transition to laugh squint */
      39%                { transform: scaleY(1); }
      42%, 70%           { transform: scaleY(0.25); }
      74%                { transform: scaleY(1); }

      /* Normal blink near end */
      88%                { transform: scaleY(1); }
      90%                { transform: scaleY(0.1); }
      92%                { transform: scaleY(1); }
    }

    /* ---- MOUTH — grows during laugh ---- */
    .mouth {
      transform-origin: 410px 258px;
      animation: mouthLaugh 5s ease-in-out infinite;
    }
    @keyframes mouthLaugh {
      0%, 38%, 76%, 100% { transform: scale(1, 1); }
      44%, 68%           { transform: scale(1.25, 1.4) translateY(2px); }
    }

    /* ---- EYEBROWS — lift during wave, scrunch during laugh ---- */
    .brow-left {
      transform-origin: 320px 170px;
      animation: browLeftAnim 5s ease-in-out infinite;
    }
    .brow-right {
      transform-origin: 470px 175px;
      animation: browRightAnim 5s ease-in-out infinite;
    }
    @keyframes browLeftAnim {
      0%, 38%, 76%, 100% { transform: translateY(0); }
      10%, 30%           { transform: translateY(-3px); }
      44%, 68%           { transform: translateY(2px); }
    }
    @keyframes browRightAnim {
      0%, 38%, 76%, 100% { transform: translateY(0); }
      10%, 30%           { transform: translateY(-3px); }
      44%, 68%           { transform: translateY(2px); }
    }

    /* ---- Shine pulse ---- */
    .shine-highlight { animation: shinePulse 5s ease-in-out infinite; }
    @keyframes shinePulse { 0%, 100% { opacity: 0.65; } 50% { opacity: 1; } }

    /* ---- Front Bushes ---- */
    .layer-front {
      z-index: 4; width: 106%; left: -3%; bottom: -1%;
      animation: bushSway 5s ease-in-out infinite;
    }
    .layer-front svg { width: 100%; height: auto; display: block; }
    @keyframes bushSway {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(0.3%); }
    }

    .note { margin-top: 14px; font-size: 12px; opacity: 0.35; }
  </style>
</head>
